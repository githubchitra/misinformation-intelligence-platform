version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./models:/app/models

  ui:
    image: python:3.10-slim
    working_dir: /app
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    command: >
      sh -c "pip install streamlit requests matplotlib lime shap && 
             streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0"
    depends_on:
      - api

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: mlflow ui --host 0.0.0.0
