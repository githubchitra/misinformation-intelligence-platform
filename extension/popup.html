<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #0f172a;
      color: #f1f5f9;
      margin: 0;
      padding: 16px;
    }
    h3 {
      margin-top: 0;
      color: #3b82f6;
      font-size: 16px;
      border-bottom: 1px solid #334155;
      padding-bottom: 8px;
    }
    textarea {
      width: 100%;
      height: 80px;
      background-color: #1e293b;
      color: #f1f5f9;
      border: 1px solid #475569;
      border-radius: 4px;
      padding: 8px;
      box-sizing: border-box;
      resize: none;
      font-size: 12px;
      margin-bottom: 10px;
    }
    textarea:focus {
      outline: none;
      border-color: #3b82f6;
    }
    button {
      width: 100%;
      background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
      color: white;
      border: none;
      padding: 8px;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover {
      opacity: 0.9;
    }
    #result {
      margin-top: 12px;
      font-size: 13px;
      display: none;
    }
    .verdict-box {
      padding: 8px;
      border-radius: 4px;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .real {
      background-color: rgba(16, 185, 129, 0.1);
      border: 1px solid #10b981;
      color: #10b981;
    }
    .fake {
      background-color: rgba(239, 68, 68, 0.1);
      border: 1px solid #ef4444;
      color: #ef4444;
    }
    .error {
      color: #f87171;
    }
    .label {
      font-size: 10px;
      font-weight: bold;
      color: #94a3b8;
      margin-bottom: 2px;
      margin-top: 8px;
    }
    .info {
      background-color: rgba(59, 130, 246, 0.1);
      border: 1px solid #3b82f6;
      color: #3b82f6;
    }
  </style>
</head>
<body>
  <h3>FakeNews AI Quick Verifier</h3>
  <textarea id="text-input" placeholder="Paste claim here (min 10 chars)..."></textarea>
  <button id="verify-btn">Verify Verdict</button>
  
  <div id="result">
    <div class="label">AI CLASSIFIER</div>
    <div id="orig-verdict" class="verdict-box"></div>
    
    <div class="label">WEB FACT-CHECK</div>
    <div id="fc-verdict" class="verdict-box"></div>
    <div id="fc-claim" style="font-size: 11px; margin-bottom: 8px; color: #94a3b8; font-style: italic;"></div>
    
    <div class="label">FINAL VERDICT</div>
    <div id="final-verdict" class="verdict-box" style="font-size: 16px;"></div>
    <div id="override-reason" style="font-size: 11px; color: #facc15; margin-top: 4px;"></div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
